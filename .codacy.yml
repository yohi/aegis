---
exclude_paths:
  - "AGENTS.md"

engines:
  bandit:
    exclude_paths:
      - "tests/**"
    skips:
      - B603
      - B607
  semgrep:
    exclude_rules:
      - "python.lang.security.audit.dangerous-subprocess-use-audit.dangerous-subprocess-use-audit"
  flake8:
    # F999 is often a false positive in newer Python syntax for older linters
    # We ignore B101 (assert) in tests via bandit exclusion above.
    exclude_paths:
      - "**/__init__.py"
  duplication:
    exclude_paths:
      - "tests/**"
