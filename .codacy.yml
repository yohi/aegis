---
engines:
  bandit:
    exclude_paths:
      - "tests/**"
  flake8:
    # F999 is often a false positive in newer Python syntax for older linters
    # We ignore B101 (assert) in tests via bandit exclusion above.
    exclude_paths:
      - "**/__init__.py"
  duplication:
    exclude_paths:
      - "tests/**"
